<svg width="1000" height="320" viewBox="0 0 1000 320" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" aria-labelledby="si-title si-desc">
  <title id="si-title">How bundles stack across the Default Slack access, workspace, and channel scopes</title>
  <desc id="si-desc">Nested boxes. The outermost box is the Default Slack access scope: a bundle attached here is the baseline every channel gets. Inside it, two examples. Outside the workspace box, a channel called another-team in a different workspace gets only the default bundle. Inside the workspace box, which adds an optional bundle for channels inside it, two channel boxes: a public channel called general, with no channel bundle, gets the default plus the workspace bundle; a private channel, marked with a lock, with its own channel bundle, gets all three, the default, workspace, and channel bundles.</desc>

  <rect x="0.5" y="0.5" width="999" height="319" rx="24" fill="#21201C" stroke="#F0EFEA" stroke-opacity="0.08"/>

  
  <rect x="40" y="40" width="920" height="270" rx="16" fill="#3B3A52" fill-opacity="0.28" stroke="#3B3A52" stroke-width="1.5"/>
  <rect x="60" y="58" width="10" height="10" rx="3" fill="#5A597A"/>
  <text x="80" y="68" font-size="15.5" font-weight="600" fill="#F0EFEA">Default Slack access</text>
  <text x="262" y="68" font-size="14" fill="#B8B6AE">a bundle attached here is the baseline every channel gets</text>

  
  <rect x="60" y="176" width="200" height="104" rx="12" fill="#2C2B27" stroke="#F0EFEA" stroke-opacity="0.12"/>
  <text x="78" y="204" font-size="14" font-weight="600" fill="#F0EFEA"># another-team</text>
  <text x="78" y="226" font-size="12.5" fill="#B8B6AE">a different workspace</text>
  <text x="78" y="256" font-size="12.5" font-weight="700" fill="#E89B6C">Gets: default</text>

  
  <rect x="280" y="104" width="680" height="190" rx="14" fill="#2F4038" fill-opacity="0.30" stroke="#2F4038" stroke-width="1.5"/>
  <rect x="300" y="122" width="10" height="10" rx="3" fill="#4D6E62"/>
  <text x="320" y="132" font-size="15.5" font-weight="600" fill="#F0EFEA">Workspace</text>
  <text x="430" y="132" font-size="14" fill="#B8B6AE">an optional bundle here adds to the channels inside</text>

  
  <rect x="310" y="176" width="320" height="104" rx="12" fill="#2C2B27" stroke="#F0EFEA" stroke-opacity="0.12"/>
  <text x="328" y="204" font-size="15" font-weight="600" fill="#F0EFEA"># general</text>
  <text x="328" y="226" font-size="13.5" fill="#B8B6AE">no channel bundle</text>
  <text x="328" y="254" font-size="13.5" font-weight="700" fill="#E89B6C">Gets: default</text>
  <text x="328" y="274" font-size="13.5" font-weight="700" fill="#E89B6C">+ workspace</text>

  
  <rect x="650" y="176" width="290" height="104" rx="12" fill="#2C2B27" stroke="#F0EFEA" stroke-opacity="0.12"/>
  <path d="M671,193 v-3.2 a4.2,4.2 0 0 1 8.4,0 v3.2" stroke="#F0EFEA" stroke-width="1.8" fill="none"/>
  <rect x="668" y="193" width="14.4" height="10.5" rx="2" fill="#F0EFEA"/>
  <text x="692" y="204" font-size="15" font-weight="600" fill="#F0EFEA">Private channel</text>
  <text x="668" y="226" font-size="13.5" fill="#B8B6AE">+ a channel bundle here</text>
  <text x="668" y="254" font-size="13.5" font-weight="700" fill="#E89B6C">Gets: default +</text>
  <text x="668" y="274" font-size="13.5" font-weight="700" fill="#E89B6C">workspace + channel</text>
</svg>
